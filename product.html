<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noxtary - Product Details</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ══ NAVBAR ══ -->
    <header class="navbar">
        <div class="nav-left">
            <a href="home.html" class="back-home" title="Back to Home">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5"
                     stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
            </a>
            <span class="brand-title" style="font-size:1.4rem; letter-spacing:3px;">NOXTARY</span>
        </div>

        <div style="display: flex; gap: 10px; align-items: center;">
            <!-- Theme Switcher (Instant Toggle) -->
            <div class="theme-wrapper">
                <button class="theme-btn-instant" id="themeBtn" title="Toggle theme" data-current="cyber-dark">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="sun-icon">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="moon-icon" style="display:none">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
            </div>

            <!-- Translate -->
            <div class="translate-wrapper">
                <button class="translate-btn" id="translateBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="2" y1="12" x2="22" y2="12"/>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                    </svg>
                    <span id="currentLang">EN</span>
                    <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="6 9 12 15 18 9"/>
                    </svg>
                </button>
                <div class="lang-dropdown" id="langDropdown">
                    <button class="lang-option active" data-lang="EN" data-label="English">🇬🇧 English</button>
                    <button class="lang-option" data-lang="AR" data-label="العربية">🇸🇦 العربية</button>
                </div>
            </div>

            <a href="#" class="login-btn" id="loginBtn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5"
                     stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                <span data-i18n="login">Login</span>
            </a>
        </div>
    </header>

    <!-- ══ MAIN CONTENT ══ -->
    <main style="width:100%; padding-top: 80px;">
        <div id="product-load-container">
            <!-- loadProductDetails() from script.js injects content here -->
            <div style="text-align:center; padding:80px 20px;
                        font-family:'Orbitron',sans-serif; font-size:0.85rem;
                        color:var(--blue-accent); opacity:0.6; letter-spacing:2px;">
                LOADING...
            </div>
        </div>
    </main>

    <!-- Login Modal overlay -->
    <div class="modal-overlay" id="loginModal">
        <div class="cyber-modal">
            <button class="modal-close" id="modalClose">&times;</button>
            <h2 class="modal-title" data-i18n="login_title">Cyber Authenticate</h2>
            <form class="modal-form" id="loginForm">
                <div class="form-group">
                    <label for="cyberUser" data-i18n="username">Access Identity</label>
                    <input type="text" id="cyberUser" class="cyber-input" placeholder="User / ID" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="cyberPass" data-i18n="password">Security Code</label>
                    <input type="password" id="cyberPass" class="cyber-input" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="cyber-btn" data-i18n="sign_in">Establish Link</button>
            </form>
            <div class="modal-footer">
                <span data-i18n="no_account">New operator?</span> <a href="#" data-i18n="contact_admin">Contact admin</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
