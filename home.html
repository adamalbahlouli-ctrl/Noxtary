<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noxtary - Home</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ── Tabs responsive layout ── */
        @media (min-width: 600px) {
            .tabs-container {
                display: flex;
                flex-direction: row;
                flex-wrap: nowrap;
                gap: 10px;
                overflow-x: auto;
            }
        }
        @media (max-width: 599px) {
            .tabs-container {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            .tabs-container .tab-btn {
                width: 100%;
                text-align: center;
            }
        }

        /* ── Footer Styles ── */
        .site-footer {
            width: 100%;
            border-top: 1px solid rgba(66, 165, 245, 0.12);
            padding: 32px 24px;
            text-align: center;
            z-index: 1;
            position: relative;
            margin-top: 40px;
            box-sizing: border-box;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px 20px;
            margin-bottom: 16px;
        }

        .footer-links a {
            color: var(--text-muted, rgba(255, 255, 255, 0.55));
            text-decoration: none;
            font-size: 0.82rem;
            font-family: var(--font-body, 'Cairo', sans-serif);
            transition: color 0.25s ease;
        }
        .footer-links a:hover {
            color: var(--blue-accent, #64b5f6);
        }

        .footer-sep {
            color: rgba(255, 255, 255, 0.18);
            font-size: 0.75rem;
        }

        .footer-copy {
            color: var(--text-muted, rgba(255, 255, 255, 0.55));
            font-size: 0.78rem;
            font-family: var(--font-body, 'Cairo', sans-serif);
        }
    </style>
</head>

<body class="home-page">

    <!-- ══ NAVBAR ══ -->
    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html" class="back-home" title="Back to Landing">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5"
                     stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </a>
            <img src="https://i.ibb.co/Rpkk0N6g/1000105011.png" alt="Noxtary Logo" class="mini-logo">
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search apps, mods, books..." data-i18n-placeholder="search_placeholder">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
        </div>

        <div style="display: flex; gap: 10px; align-items: center;">
            <!-- Theme Switcher (Instant Toggle) -->
            <div class="theme-wrapper">
                <button class="theme-btn-instant" id="themeBtn" title="Toggle theme" data-current="cyber-dark">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="sun-icon">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="moon-icon">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
            </div>

            <!-- Translate -->
            <div class="translate-wrapper">
                <button class="translate-btn" id="translateBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="2" y1="12" x2="22" y2="12"/>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                    </svg>
                    <span id="currentLang">EN</span>
                    <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="6 9 12 15 18 9"/>
                    </svg>
                </button>
                <div class="lang-dropdown" id="langDropdown">
                    <button class="lang-option active" data-lang="EN" data-label="English">🇬🇧 English</button>
                    <button class="lang-option" data-lang="AR" data-label="العربية">🇸🇦 العربية</button>
                </div>
            </div>

            <a href="#" class="login-btn" id="loginBtn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5"
                     stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                <span data-i18n="login">Login</span>
            </a>
        </div>
    </nav>

    <div id="userDropdown" class="user-dropdown" aria-label="User actions">
        <button class="user-dropdown-item" id="logoutBtn" type="button">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            <span data-i18n="logout">تسجيل الخروج / Logout</span>
        </button>
    </div>

    <!-- ══ MAIN CONTENT ══ -->
    <div class="content-wrapper">



        <!-- Tabs -->
        <div class="tabs-container">
            <button class="tab-btn active" data-filter="all" data-i18n="tab_all">All</button>
            <button class="tab-btn" data-filter="apps" data-i18n="tab_apps">Apps</button>
            <button class="tab-btn" data-filter="books_articles" data-i18n="tab_books_articles">Books &amp; Articles</button>
            <button class="tab-btn" data-filter="mods" data-i18n="tab_mods">Mods</button>
            <button class="tab-btn" data-filter="audio" data-i18n="tab_audio">Audio</button>
            <button class="tab-btn" data-filter="services" data-i18n="tab_services">Services</button>
        </div>

        <!-- Cards Grid — populated by script.js renderItems() -->
        <div class="items-grid" id="itemsGrid"></div>

    </div>

    <!-- ══ FOOTER ══ -->
    <footer class="site-footer">
        <div class="footer-links">
            <a href="terms.html" data-i18n="terms_of_service">Terms of Service</a>
            <span class="footer-sep">·</span>
            <a href="privacy.html" data-i18n="privacy_policy">Privacy Policy</a>
            <span class="footer-sep">·</span>
            <a href="refund.html" data-i18n="refund_policy">Refund Policy</a>
            <span class="footer-sep">·</span>
            <a href="mailto:Noxtary.contact@gmail.com" data-i18n="contact_us">Contact Us</a>
        </div>
        <p class="footer-copy" data-i18n="all_rights_reserved">© 2026 Noxtary. All rights reserved.</p>
    </footer>

    <!-- Login Modal overlay -->
    <div class="modal-overlay" id="loginModal">
        <div class="cyber-modal">
            <button class="modal-close" id="modalClose">&times;</button>
            <h2 class="modal-title" data-i18n="login_title">Cyber Authenticate</h2>
            <button class="cyber-btn" id="googleSignInBtn" type="button" style="display:flex; align-items:center; justify-content:center; gap:10px;">
                <svg width="18" height="18" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span data-i18n="sign_in_google">Sign in with Google</span>
            </button>
            <div class="modal-footer">
                <span data-i18n="no_account">New operator?</span> <a href="#" data-i18n="contact_admin">Contact admin</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
