<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noxtary - Product Details</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ══ NAVBAR ══ -->
    <header class="navbar">
        <div class="nav-left">
            <a href="home.html" class="back-home" title="Back to Home">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5"
                     stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
            </a>
            <span class="brand-title" style="font-size:1.4rem; letter-spacing:3px;">NOXTARY</span>
        </div>

        <span style="font-family:'Orbitron',sans-serif; font-size:0.7rem;
                     color:var(--blue-accent); letter-spacing:2px; opacity:0.7;">
            WORKSPACE
        </span>
    </header>

    <!-- ══ MAIN CONTENT ══ -->
    <main style="width:100%; padding-top: 80px;">
        <div id="product-load-container">
            <!-- loadProductDetails() from script.js injects content here -->
            <div style="text-align:center; padding:80px 20px;
                        font-family:'Orbitron',sans-serif; font-size:0.85rem;
                        color:var(--blue-accent); opacity:0.6; letter-spacing:2px;">
                LOADING...
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
